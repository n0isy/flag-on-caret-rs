name: build-and-release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy (deny warnings)
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/FlagOnCaret | Out-Null
          Copy-Item target/release/FlagOnCaret.exe dist/FlagOnCaret/
          Copy-Item -Recurse assets/flags   dist/FlagOnCaret/flags
          Copy-Item -Recurse assets/cursors dist/FlagOnCaret/cursors
          Copy-Item README.md dist/FlagOnCaret/
          Compress-Archive -Path dist/FlagOnCaret -DestinationPath dist/FlagOnCaret_portable.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlagOnCaret-portable
          path: dist/FlagOnCaret_portable.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/FlagOnCaret_portable.zip
