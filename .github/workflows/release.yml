name: build-and-release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Clippy (deny warnings)
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Package portable zip (self-contained exe)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/FlagOnCaret.exe dist/FlagOnCaret.exe
          Compress-Archive -Path dist/FlagOnCaret.exe, README.md -DestinationPath dist/FlagOnCaret_portable.zip -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          Copy-Item target/release/FlagOnCaret.exe installer/FlagOnCaret.exe
          $ver = "${{ steps.ver.outputs.version }}"
          if (-not $ver) { $ver = "0.0.0" }
          & $iscc "/DMyAppVersion=$ver" installer/FlagOnCaret.iss
          Copy-Item installer/FlagOnCaret_setup.exe dist/FlagOnCaret_setup.exe

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FlagOnCaret-${{ steps.ver.outputs.version }}
          path: |
            dist/FlagOnCaret_portable.zip
            dist/FlagOnCaret_setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/FlagOnCaret_portable.zip
            dist/FlagOnCaret_setup.exe
